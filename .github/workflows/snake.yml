name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: alokitm
          outputs: |
            outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=#ff0000&color_dots=#161b22,#5a0000,#8b0000,#cc0000,#ff3333

      - name: Deploy to Output Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
