name: Custom Red Snake

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          cd snake
          npm install

      - name: Generate SVG
        run: |
          cd snake
          node generateSnake.js

      - name: Deploy SVG
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: snake/output
